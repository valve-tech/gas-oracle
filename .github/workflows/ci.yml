name: CI

# Standard test + typecheck on every push and pull request. Runs once
# at the workspace root, walking every package via yarn workspaces
# foreach. Kept separate from release.yml so the publish workflow
# only runs on tags and stays narrowly scoped on permissions.
#
# Security note: this workflow runs only the repo's own scripts on
# the repo's own source. No untrusted user inputs (issue/PR titles,
# commit messages, head refs) are interpolated into `run:` commands,
# so the standard workflow-injection class doesn't apply.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      # Build first so cross-package type declarations exist on disk
      # (e.g. wallet-adapter's tsc lookup of @valve-tech/viem-errors
      # resolves to its dist/*.d.ts via the workspace symlink). Build
      # is workspace-topological so deps build before dependents.
      - name: Build
        run: yarn build

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Typecheck examples
        run: yarn typecheck:examples

      - name: Test
        run: yarn test
