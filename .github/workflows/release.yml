name: Release

# Publishes @valve-tech/gas-oracle to npm using Trusted Publishers (OIDC).
# No NPM_TOKEN secret required — npm verifies the GitHub OIDC claim
# (repo + workflow path + environment) against a trusted-publisher
# config maintained at https://npmjs.com/settings/valve-tech/publishing.
#
# Trigger: push a tag matching `v*` (e.g. `v0.2.0`). Manual dispatch is
# also enabled for one-off republishes (e.g. recovering from a tag typo).
#
# First-publish note: npm supports "pending" trusted publishers — the
# very first run that matches the configured publisher will create the
# package and scope AND publish it. Subsequent runs treat the publisher
# as active.
#
# Security note: this workflow only consumes commit metadata via
# actions/checkout (which sanitizes inputs). No untrusted user inputs
# (issue/PR titles, commit messages, head refs) are interpolated into
# `run:` commands, so the standard workflow-injection class doesn't
# apply.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # `id-token: write` is what lets the runner mint the OIDC JWT npm
    # uses to verify provenance. `contents: read` is the minimum
    # checkout needs. Nothing else is granted — least-privilege.
    permissions:
      id-token: write
      contents: read
    # Use a deployment environment to gate publishing — lets you require
    # manual approval, restrict secrets, and audit who triggered each
    # release. Configure on GitHub: Settings → Environments → npm-publish.
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@valve-tech/gas-oracle

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Setting registry-url configures npm CLI to talk to
          # npmjs.com — required for trusted publishing to negotiate.
          registry-url: 'https://registry.npmjs.org'

      # Yarn 4 (Berry) — install via corepack, frozen lockfile.
      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      # `--provenance` attaches a SLSA build attestation signed by the
      # GitHub OIDC token. `--access public` is required on the first
      # publish for scoped packages (npm defaults to private otherwise).
      - name: Publish to npm
        run: npm publish --access public --provenance
